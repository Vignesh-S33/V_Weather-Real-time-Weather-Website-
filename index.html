<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>mini project</title>
  <link rel="stylesheet" href="style.css">
  <link href="script.js">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Charis+SIL:ital,wght@0,400;0,700;1,400;1,700&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
  
  <div class="web">

    <img src="pic2.jpg" class="pic1">

    <div class="brand">
      <h1>v weather</h1>
      <i class="fa-solid fa-cloud-bolt"></i>
    </div>
    
    <div class="card">
      <div class="search">
        <input type="text" placeholder="Enter city name" class="input">

        <button class="button">Search</button>
      </div>
      
      <div class="weather">
        <h1 class="temp">--°C</h1>
        <h2 class="city">City Name</h2>
        <p class="details">Humidity: --% | Wind: -- km/h</p>
      </div>
    </div>
  </div>



  <script src="script.js"></script>
</body>
</html>
